<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#4B6826">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Whetstone">
  <title>Whetstone</title>
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <header class="appbar">
    <span class="appbar-slot" id="appbar-back"></span>
    <div class="appbar-titles">
      <span class="appbar-title" id="appbar-title">Whetstone</span>
      <span class="appbar-brand" id="collection-name"></span>
    </div>
    <button class="appbar-slot appbar-menu" id="hamburger" aria-label="Menu" aria-expanded="false" aria-controls="drawer"></button>
  </header>
  <main class="content" id="view"></main>
  <div class="drawer-overlay" id="drawer-overlay" hidden></div>
  <nav class="drawer" id="drawer" aria-label="Primary" hidden></nav>
  <script>window.__WHETSTONE_DEMO__ = true;</script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
