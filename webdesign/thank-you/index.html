<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanks! We'll Be in Touch — Axly's Customs</title>
  <meta name="description" content="Thank you for reaching out about web design. We'll get back to you within a day.">
  <meta name="theme-color" content="#0f0b2e">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://axly.com/webdesign/thank-you/">

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira:wght@600;700;800;900&family=Lexend:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/style.css">
  <style>
    .thankyou {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-2xl);
    }
    .thankyou-content { max-width: 520px; }
    .thankyou h1 {
      font-size: var(--text-3xl);
      margin-bottom: var(--space-base);
    }
    .thankyou p {
      color: var(--color-chrome);
      font-size: var(--text-lg);
      line-height: 1.6;
      margin-bottom: var(--space-xl);
      margin-inline: auto;
    }
    .thankyou-links {
      display: flex;
      gap: var(--space-md);
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

  <main>
    <section class="thankyou">
      <div class="thankyou-content">
        <span class="label">Message Received</span>
        <h1>Thanks! We'll Be <span class="accent-text">in Touch</span></h1>
        <p>
          We got your info and we'll get back to you within a day.
          In the meantime, feel free to poke around.
        </p>
        <div class="thankyou-links">
          <a href="/" class="btn btn-primary">Back to Home</a>
          <a href="/webdesign/" class="btn btn-secondary">Web Design</a>
        </div>
      </div>
    </section>
  </main>

  <script src="/js/main.js" defer></script>
</body>
</html>
